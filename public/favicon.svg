<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Professional Medical Turquoise Background -->
  <rect width="100%" height="100%" fill="#0ca593" />
  
  <!-- Symmetric design rotated to match the diagonal layout of the original logo -->
  <g transform="translate(250, 250) rotate(-24) translate(-250, -250)">
    <!-- Outer Ring -->
    <circle cx="250" cy="250" r="200" fill="none" stroke="white" stroke-width="26" />
    
    <!-- Inner Ring -->
    <circle cx="250" cy="250" r="140" fill="none" stroke="white" stroke-width="26" />
    
    <!-- Strategic Background Masks to create clean gap space for the horizontal pulse track -->
    <rect x="25" y="210" width="450" height="80" fill="#0ca593" />
    
    <!-- Bottom-Left Parallel Double Accent Lines -->
    <path d="M 40 215 L 210 215" stroke="white" stroke-width="20" stroke-linecap="round" />
    <path d="M 40 270 L 220 270" stroke="white" stroke-width="20" stroke-linecap="round" />
    
    <!-- Central EKG Heartbeat Pulse Wave -->
    <path d="M 220 270 L 250 110 L 280 390 L 310 230" fill="none" stroke="white" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Top-Right Bold Modern Block with Symmetrical Slashes -->
    <path d="M 310 230 L 460 150 L 460 210 L 310 290 Z" fill="white" />
    <path d="M 330 215 L 430 165" stroke="#0ca593" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
